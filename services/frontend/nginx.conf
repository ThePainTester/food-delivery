# JSON access log so Logstash can parse fields without grok rules.
# `env` is left to Filebeat's kubernetes.namespace metadata since
# nginx doesn't expand $ENV at config time without templating.
log_format json_access escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"service":"frontend",'
        '"status":$status,'
        '"method":"$request_method",'
        '"request":"$request",'
        '"path":"$request_uri",'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"remote_addr":"$remote_addr",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"'
    '}';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout json_access;
    error_log  /dev/stderr warn;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Locked to localhost — the nginx-prometheus-exporter sidecar is the
    # only allowed reader.
    location = /stub_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
