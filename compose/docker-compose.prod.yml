# Prod override: tagged images, always-restart, log rotation, no host port
# exposure on data stores or the rabbit management UI.
#
# Resource limits are intentionally NOT set here. `deploy:` is a Swarm-only
# directive — `docker compose up` ignores it — so any cpu/memory caps belong
# in the Kubernetes manifests, not in this file.
#
# In a real prod environment the data stores are usually managed services
# (RDS / Atlas / ElastiCache / CloudAMQP). This file keeps them in-compose for
# parity with the architecture spec; swap to external URLs by setting the
# *_URL env vars and removing the corresponding services if you go managed.

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  users-db:
    restart: always
    logging: *logging

  orders-db:
    restart: always
    logging: *logging

  payments-db:
    restart: always
    logging: *logging

  dispatch-db:
    restart: always
    logging: *logging

  restaurants-db:
    restart: always
    logging: *logging

  orders-cache:
    restart: always
    logging: *logging

  dispatch-cache:
    restart: always
    logging: *logging

  rabbitmq:
    image: rabbitmq:3.13-alpine
    restart: always
    logging: *logging

  user-service:
    image: ${REGISTRY}/user-service:${IMAGE_TAG}
    restart: always
    logging: *logging

  restaurant-service:
    image: ${REGISTRY}/restaurant-service:${IMAGE_TAG}
    restart: always
    logging: *logging

  order-service:
    image: ${REGISTRY}/order-service:${IMAGE_TAG}
    restart: always
    logging: *logging

  payment-service:
    image: ${REGISTRY}/payment-service:${IMAGE_TAG}
    restart: always
    logging: *logging

  dispatch-service:
    image: ${REGISTRY}/dispatch-service:${IMAGE_TAG}
    restart: always
    logging: *logging

  frontend:
    image: ${REGISTRY}/frontend:${IMAGE_TAG}
    restart: always
    logging: *logging

  gateway:
    restart: always
    logging: *logging
    ports:
      - "80:80"
      - "443:443"
