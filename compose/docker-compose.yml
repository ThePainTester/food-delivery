# The project name is set per environment via COMPOSE_PROJECT_NAME in
# .env.<env> so dev/staging/prod can run side-by-side on one host. Compose
# prefixes every network and volume with that project name automatically;
# Traefik's --providers.docker.network flag (below) substitutes the same
# variable so it points at this stack's app-net regardless of env.

# Network segmentation
# -------------------
# public-net          gateway only (and a future ingress)
# app-net             gateway + frontend + every backend service for HTTP RPC
# rabbit-net          rabbitmq + every backend service that messages
# <svc>-data-net      one per service, joining only that service to its
#                     own datastore. DBs/caches live ONLY on their data-net
#                     so they cannot be reached from the app or the broker.
#
# Edge routing
# ------------
# The `gateway` service is stock Traefik. All routing rules live on the
# backends + frontend as `traefik.*` labels — there is no custom image or
# config file to maintain. When we move to Kubernetes the gateway container
# disappears and these rules become Ingress objects (per service).

x-jwt-volume: &jwt-volume
  type: bind
  source: ./jwt
  target: /run/jwt
  read_only: true

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  interval: 5s
  timeout: 5s
  retries: 20

services:
  # --- per-service data stores -------------------------------------------------

  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: users
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ../services/user-service/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck: *postgres-healthcheck
    networks:
      - users-data-net

  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${ORDERS_DB_USER}
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD}
      POSTGRES_DB: orders
    volumes:
      - orders-db-data:/var/lib/postgresql/data
      - ../services/order-service/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck: *postgres-healthcheck
    networks:
      - orders-data-net

  payments-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PAYMENTS_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASSWORD}
      POSTGRES_DB: payments
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ../services/payment-service/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck: *postgres-healthcheck
    networks:
      - payments-data-net

  restaurants-db:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${RESTAURANTS_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${RESTAURANTS_DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${RESTAURANTS_DB_NAME:-restaurants}
    volumes:
      - restaurants-db-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - restaurants-data-net

  orders-cache:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - orders-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - orders-data-net

  dispatch-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DISPATCH_DB_USER}
      POSTGRES_PASSWORD: ${DISPATCH_DB_PASSWORD}
      POSTGRES_DB: dispatch
    volumes:
      - dispatch-db-data:/var/lib/postgresql/data
      - ../services/dispatch-service/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck: *postgres-healthcheck
    networks:
      - dispatch-data-net

  dispatch-cache:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - dispatch-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dispatch-data-net

  # --- shared message broker ---------------------------------------------------

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
    volumes:
      - rabbit-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - rabbit-net

  # --- application services ----------------------------------------------------

  user-service:
    image: ${REGISTRY:-food-delivery}/user-service:${USER_SERVICE_TAG:-${IMAGE_TAG:-latest}}
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${USERS_DB_USER}:${USERS_DB_PASSWORD}@users-db:5432/users?sslmode=disable
      JWT_PRIVATE_KEY_PATH: /run/jwt/jwt.key
      JWT_ISSUER: ${JWT_ISSUER:-user-service}
    volumes:
      - *jwt-volume
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - app-net
      - rabbit-net
      - users-data-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user.rule=PathRegexp(`^/api/(auth|users)(/.*)?$$`)"
      - "traefik.http.routers.user.entrypoints=web"
      - "traefik.http.routers.user.middlewares=strip-api@docker"
      - "traefik.http.services.user.loadbalancer.server.port=8080"

  restaurant-service:
    image: ${REGISTRY:-food-delivery}/restaurant-service:${RESTAURANT_SERVICE_TAG:-${IMAGE_TAG:-latest}}
    environment:
      PORT: "8080"
      MONGO_URL: mongodb://${RESTAURANTS_DB_USER}:${RESTAURANTS_DB_PASSWORD}@restaurants-db:27017/${RESTAURANTS_DB_NAME:-restaurants}?authSource=admin
      MONGO_DB: ${RESTAURANTS_DB_NAME:-restaurants}
      JWKS_URL: http://user-service:8080/.well-known/jwks.json
      JWT_ISSUER: ${JWT_ISSUER:-user-service}
      # The gateway strips /api before forwarding; this tells FastAPI it's
      # behind that prefix so 307 trailing-slash redirects keep /api in the
      # Location header.
      ROOT_PATH: /api
    depends_on:
      restaurants-db:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - app-net
      - rabbit-net
      - restaurants-data-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.restaurant.rule=PathPrefix(`/api/restaurants`)"
      - "traefik.http.routers.restaurant.entrypoints=web"
      - "traefik.http.routers.restaurant.middlewares=strip-api@docker"
      - "traefik.http.services.restaurant.loadbalancer.server.port=8080"

  order-service:
    image: ${REGISTRY:-food-delivery}/order-service:${ORDER_SERVICE_TAG:-${IMAGE_TAG:-latest}}
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${ORDERS_DB_USER}:${ORDERS_DB_PASSWORD}@orders-db:5432/orders?sslmode=disable
      REDIS_URL: redis://orders-cache:6379
      RABBIT_URL: amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbitmq:5672
      JWKS_URL: http://user-service:8080/.well-known/jwks.json
      JWT_ISSUER: ${JWT_ISSUER:-user-service}
      RESTAURANT_SERVICE_URL: http://restaurant-service:8080
      DELIVERY_FEE_MINOR: ${DELIVERY_FEE_MINOR:-3000}
      LOCATION_TTL_SECONDS: ${LOCATION_TTL_SECONDS:-120}
    depends_on:
      orders-db:
        condition: service_healthy
      orders-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      restaurant-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - app-net
      - rabbit-net
      - orders-data-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.order.rule=PathPrefix(`/api/orders`)"
      - "traefik.http.routers.order.entrypoints=web"
      - "traefik.http.routers.order.middlewares=strip-api@docker"
      - "traefik.http.services.order.loadbalancer.server.port=8080"

  dispatch-service:
    image: ${REGISTRY:-food-delivery}/dispatch-service:${DISPATCH_SERVICE_TAG:-${IMAGE_TAG:-latest}}
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${DISPATCH_DB_USER}:${DISPATCH_DB_PASSWORD}@dispatch-db:5432/dispatch?sslmode=disable
      REDIS_URL: redis://dispatch-cache:6379
      RABBIT_URL: amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbitmq:5672
      JWKS_URL: http://user-service:8080/.well-known/jwks.json
      JWT_ISSUER: ${JWT_ISSUER:-user-service}
      OFFER_TIMEOUT_MS: ${OFFER_TIMEOUT_MS:-12000}
      DISPATCH_LOCK_TTL_S: ${DISPATCH_LOCK_TTL_S:-60}
      SEARCH_RADIUS_M: ${SEARCH_RADIUS_M:-3000}
      HEARTBEAT_STALE_MS: ${HEARTBEAT_STALE_MS:-30000}
    depends_on:
      dispatch-db:
        condition: service_healthy
      dispatch-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - app-net
      - rabbit-net
      - dispatch-data-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dispatch.rule=PathPrefix(`/api/dispatch`)"
      - "traefik.http.routers.dispatch.entrypoints=web"
      - "traefik.http.routers.dispatch.middlewares=strip-api@docker"
      - "traefik.http.services.dispatch.loadbalancer.server.port=8080"

  payment-service:
    image: ${REGISTRY:-food-delivery}/payment-service:${PAYMENT_SERVICE_TAG:-${IMAGE_TAG:-latest}}
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${PAYMENTS_DB_USER}:${PAYMENTS_DB_PASSWORD}@payments-db:5432/payments?sslmode=disable
      RABBIT_URL: amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbitmq:5672
      JWKS_URL: http://user-service:8080/.well-known/jwks.json
      JWT_ISSUER: ${JWT_ISSUER:-user-service}
      DEFAULT_PAYMENT_METHOD: ${DEFAULT_PAYMENT_METHOD:-mock-card}
    depends_on:
      payments-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - app-net
      - rabbit-net
      - payments-data-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payment.rule=PathPrefix(`/api/payments`)"
      - "traefik.http.routers.payment.entrypoints=web"
      - "traefik.http.routers.payment.middlewares=strip-api@docker"
      - "traefik.http.services.payment.loadbalancer.server.port=8080"

  frontend:
    image: ${REGISTRY:-food-delivery}/frontend:${FRONTEND_TAG:-${IMAGE_TAG:-latest}}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    labels:
      - "traefik.enable=true"
      # Catch-all for everything not matched by an /api/* router. The explicit
      # priority=1 makes sure it always loses to a more specific backend rule.
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # --- edge router -------------------------------------------------------------

  gateway:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      # Project-prefixed by compose; substituted from COMPOSE_PROJECT_NAME so
      # each env's gateway routes only to its own backends.
      - --providers.docker.network=${COMPOSE_PROJECT_NAME}_app-net
      - --providers.docker.constraints=Label(`com.docker.compose.project`,`${COMPOSE_PROJECT_NAME}`)
      - --entrypoints.web.address=:80
      - --log.level=INFO
      - --accesslog=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      frontend:
        condition: service_started
      user-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      dispatch-service:
        condition: service_started
    networks:
      - public-net
      - app-net
    labels:
      # Shared middleware: strip the `/api` prefix once before routing to a
      # backend so each service receives its native path layout
      # (e.g. /api/auth/login -> /auth/login at user-service).
      - "traefik.enable=true"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"

networks:
  public-net:
  app-net:
    internal: true
  rabbit-net:
    internal: true
  users-data-net:
    internal: true
  orders-data-net:
    internal: true
  payments-data-net:
    internal: true
  restaurants-data-net:
    internal: true
  dispatch-data-net:
    internal: true

volumes:
  users-db-data:
  orders-db-data:
  payments-db-data:
  restaurants-db-data:
  orders-cache-data:
  dispatch-db-data:
  dispatch-cache-data:
  rabbit-data:
