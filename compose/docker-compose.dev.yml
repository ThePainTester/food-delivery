# Dev override: build images locally, expose every port to the host, no restart loops.

services:
  users-db:
    ports: ["5433:5432"]
  orders-db:
    ports: ["5434:5432"]
  payments-db:
    ports: ["5435:5432"]
  dispatch-db:
    ports: ["5436:5432"]
  restaurants-db:
    ports: ["27017:27017"]
  orders-cache:
    ports: ["6379:6379"]
  dispatch-cache:
    ports: ["6380:6379"]
  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build:
      context: ../services/user-service
    image: food-delivery/user-service:dev
    ports: ["8081:8080"]
    restart: "no"

  restaurant-service:
    build:
      context: ../services/restaurant-service
    image: food-delivery/restaurant-service:dev
    ports: ["8082:8080"]
    restart: "no"

  order-service:
    build:
      context: ../services/order-service
    image: food-delivery/order-service:dev
    ports: ["8083:8080"]
    restart: "no"

  payment-service:
    build:
      context: ../services/payment-service
    image: food-delivery/payment-service:dev
    ports: ["8084:8080"]
    restart: "no"

  dispatch-service:
    build:
      context: ../services/dispatch-service
    image: food-delivery/dispatch-service:dev
    ports: ["8085:8080"]
    restart: "no"

  frontend:
    build:
      context: ../services/frontend
    image: food-delivery/frontend:dev
    restart: "no"

  gateway:
    # Traefik dashboard exposed on :8090 in dev for inspecting routes.
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${COMPOSE_PROJECT_NAME}_app-net
      - --providers.docker.constraints=Label(`com.docker.compose.project`,`${COMPOSE_PROJECT_NAME}`)
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "3000:80"
      - "8090:8080"
    restart: "no"
