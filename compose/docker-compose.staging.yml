# Staging override: pull tagged images from a registry, restart on failure,
# expose only the application services (data stores stay internal).

services:
  users-db:
    restart: unless-stopped
  orders-db:
    restart: unless-stopped
  payments-db:
    restart: unless-stopped
  dispatch-db:
    restart: unless-stopped
  restaurants-db:
    restart: unless-stopped
  orders-cache:
    restart: unless-stopped
  dispatch-cache:
    restart: unless-stopped
  rabbitmq:
    restart: unless-stopped

  user-service:
    image: ${REGISTRY:-food-delivery}/user-service:${IMAGE_TAG:-staging}
    restart: unless-stopped

  restaurant-service:
    image: ${REGISTRY:-food-delivery}/restaurant-service:${IMAGE_TAG:-staging}
    restart: unless-stopped

  order-service:
    image: ${REGISTRY:-food-delivery}/order-service:${IMAGE_TAG:-staging}
    restart: unless-stopped

  payment-service:
    image: ${REGISTRY:-food-delivery}/payment-service:${IMAGE_TAG:-staging}
    restart: unless-stopped

  dispatch-service:
    image: ${REGISTRY:-food-delivery}/dispatch-service:${IMAGE_TAG:-staging}
    restart: unless-stopped

  frontend:
    image: ${REGISTRY:-food-delivery}/frontend:${IMAGE_TAG:-staging}
    restart: unless-stopped

  gateway:
    restart: unless-stopped
    ports: ["8080:80"]
