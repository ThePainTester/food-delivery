apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      # The Dockerfile creates user `app` with UID/GID 10001. Setting fsGroup
      # makes K8s chgrp Secret-projected files to that gid and add group-read,
      # so the non-root app user can actually read /run/jwt/*.
      securityContext:
        fsGroup: 10001
      # Run versioned migrations against users-db before the app starts.
      # Reuses the same image (which bakes in `migrate` and /migrations) with
      # an overridden command. Idempotent — golang-migrate tracks applied
      # versions in a `schema_migrations` table on the target DB.
      initContainers:
        # Block until users-db is actually accepting connections. The DB is
        # exposed via a headless Service, which returns no DNS records until
        # at least one backing pod is Ready — so we have to wait it out
        # rather than failing fast. pg_isready exits non-zero (no DNS, no
        # port, or postgres still booting) until it's truly ready.
        - name: wait-for-db
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h users-db -p 5432 -U "$DB_USER" -d users -t 2; do
                echo "waiting for users-db..."
                sleep 2
              done
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: username }
        - name: migrate
          image: food-delivery/user-service:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/migrate"]
          args:
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          # Order matters: K8s' $(VAR) interpolation only sees env vars that
          # are listed earlier in this same env block.
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: password }
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@users-db:5432/users?sslmode=disable
      containers:
        - name: user-service
          # Overlays patch the tag (:dev / :staging / pinned). The image rewriter
          # also rewrites the initContainer above since it references the same
          # image name.
          image: food-delivery/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: user-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: password }
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@users-db:5432/users?sslmode=disable
          volumeMounts:
            - name: jwt
              mountPath: /run/jwt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: jwt
          secret:
            secretName: jwt-keypair
            defaultMode: 0o400
