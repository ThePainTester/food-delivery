apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      # fsGroup matches the `app` user (UID/GID 10001) baked into the
      # Dockerfile so projected Secret files are readable by the app.
      securityContext:
        fsGroup: 10001
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h users-db -p 5432 -U "$DB_USER" -d users -t 2; do
                echo "waiting for users-db..."
                sleep 2
              done
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: username }
        - name: migrate
          image: food-delivery/user-service:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/migrate"]
          args:
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          # K8s $(VAR) interpolation only sees env vars listed earlier
          # in the same block — keep DB_USER/DB_PASSWORD before DATABASE_URL.
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: password }
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@users-db:5432/users?sslmode=disable
      containers:
        - name: user-service
          image: food-delivery/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: user-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: users-db-credentials, key: password }
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@users-db:5432/users?sslmode=disable
            - name: OTEL_SERVICE_NAME
              value: user-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=$(POD_NAMESPACE)"
          volumeMounts:
            - name: jwt
              mountPath: /run/jwt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: jwt
          secret:
            secretName: jwt-keypair
            defaultMode: 0o400
