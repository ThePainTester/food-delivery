apiVersion: v1
kind: ConfigMap
metadata:
  name: dispatch-service-config
data:
  PORT: "8080"
  REDIS_URL: redis://dispatch-cache:6379
  JWT_ISSUER: user-service
  JWKS_URL: http://user-service:8080/.well-known/jwks.json
  OFFER_TIMEOUT_MS: "12000"
  DISPATCH_LOCK_TTL_S: "60"
  SEARCH_RADIUS_M: "3000"
  HEARTBEAT_STALE_MS: "30000"
  LOG_LEVEL: info
