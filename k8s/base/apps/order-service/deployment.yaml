apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      securityContext:
        fsGroup: 10001
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h orders-db -p 5432 -U "$DB_USER" -d orders -t 2; do
                echo "waiting for orders-db..."
                sleep 2
              done
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: orders-db-credentials, key: username }
        - name: migrate
          image: food-delivery/order-service:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/migrate"]
          args:
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: orders-db-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: orders-db-credentials, key: password }
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@orders-db:5432/orders?sslmode=disable
      containers:
        - name: order-service
          image: food-delivery/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: order-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: orders-db-credentials, key: username }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: orders-db-credentials, key: password }
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@orders-db:5432/orders?sslmode=disable
            - name: RABBIT_USER
              valueFrom:
                secretKeyRef: { name: rabbitmq-credentials, key: username }
            - name: RABBIT_PASSWORD
              valueFrom:
                secretKeyRef: { name: rabbitmq-credentials, key: password }
            - name: RABBIT_URL
              value: amqp://$(RABBIT_USER):$(RABBIT_PASSWORD)@rabbitmq:5672
            - name: OTEL_SERVICE_NAME
              value: order-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=$(POD_NAMESPACE)"
          volumeMounts:
            - name: jwt
              mountPath: /run/jwt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 384Mi
      volumes:
        - name: jwt
          configMap:
            name: jwt-pubkey
            defaultMode: 0o444
            items:
              - key: jwt.pub
                path: jwt.pub
