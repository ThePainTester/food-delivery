apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
data:
  PORT: "8080"
  REDIS_URL: redis://orders-cache:6379
  RESTAURANT_SERVICE_URL: http://restaurant-service:8080
  JWT_ISSUER: user-service
  JWKS_URL: http://user-service:8080/.well-known/jwks.json
  DELIVERY_FEE_MINOR: "3000"
  LOCATION_TTL_SECONDS: "120"
  LOG_LEVEL: info
