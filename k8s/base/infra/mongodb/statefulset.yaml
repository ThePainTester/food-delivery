apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: restaurants-db
  labels:
    app: restaurants-db
spec:
  serviceName: restaurants-db
  replicas: 1
  selector:
    matchLabels:
      app: restaurants-db
  template:
    metadata:
      labels:
        app: restaurants-db
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - name: mongo
              containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef: { name: restaurants-db-credentials, key: username }
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: restaurants-db-credentials, key: password }
            - name: MONGO_INITDB_DATABASE
              value: restaurants
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.runCommand({ping:1}).ok"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.runCommand({ping:1}).ok"
            initialDelaySeconds: 30
            periodSeconds: 20
        - name: exporter
          image: percona/mongodb_exporter:0.40
          args:
            - "--collect-all"
            - "--compatible-mode"
            - "--web.listen-address=:9216"
          env:
            - name: MONGODB_USER
              valueFrom:
                secretKeyRef: { name: restaurants-db-credentials, key: username }
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef: { name: restaurants-db-credentials, key: password }
            - name: MONGODB_URI
              value: "mongodb://$(MONGODB_USER):$(MONGODB_PASSWORD)@localhost:27017/admin"
          ports:
            - name: metrics
              containerPort: 9216
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { memory: 128Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
