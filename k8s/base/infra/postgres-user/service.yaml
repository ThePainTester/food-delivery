apiVersion: v1
kind: Service
metadata:
  name: users-db
  labels:
    app: users-db
spec:
  # Headless — required for StatefulSet stable network IDs.
  clusterIP: None
  selector:
    app: users-db
  ports:
    - name: pg
      port: 5432
      targetPort: pg
    - name: metrics
      port: 9187
      targetPort: metrics
