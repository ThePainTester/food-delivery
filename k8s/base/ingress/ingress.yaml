# Single Ingress per overlay. The `host` is patched per environment in the
# overlay (dev.food-delivery.local / staging.food-delivery.local /
# food-delivery.local) so all three can run side-by-side on one Minikube.
#
# /api/<svc>/...  ->  <svc>-service:8080/<svc>/...    (strips /api only)
# /...            ->  frontend:80
#
# Each path captures the part after `/api/` (or after `/` for the frontend)
# into $1 and the rewrite-target annotation prepends `/` so backends receive
# their native path layout — same as Compose + Traefik's `stripprefix /api`
# middleware (e.g. user-service mounts routes under /auth and /users).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-delivery
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    # SSE: don't buffer responses (keeps each frame from being held until a
    # buffer fills) and bump the read timeout so idle long-lived streams
    # aren't killed by the proxy. Customer live-tracking uses
    # GET /api/orders/<id>/location/stream.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: food-delivery.local
      http:
        paths:
          - pathType: ImplementationSpecific
            path: /api/(users(?:/.*)?)
            backend:
              service:
                name: user-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(auth(?:/.*)?)
            backend:
              service:
                name: user-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(restaurants(?:/.*)?)
            backend:
              service:
                name: restaurant-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(orders(?:/.*)?)
            backend:
              service:
                name: order-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(payments(?:/.*)?)
            backend:
              service:
                name: payment-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(dispatch(?:/.*)?)
            backend:
              service:
                name: dispatch-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /(.*)
            backend:
              service:
                name: frontend
                port:
                  number: 80
