# Single Ingress per overlay. The `host` is patched per environment in the
# overlay (dev.food-delivery.local / staging.food-delivery.local /
# food-delivery.local) so all three can run side-by-side on one Minikube.
#
# /api/<svc>/...  ->  <svc>-service:8080/<svc>/...    (strips /api only)
# /...            ->  frontend:80
#
# Each path captures the part after `/api/` (or after `/` for the frontend)
# into $1 and the rewrite-target annotation prepends `/` so backends receive
# their native path layout — same as Compose + Traefik's `stripprefix /api`
# middleware (e.g. user-service mounts routes under /auth and /users).
# SSE note: no per-route nginx tuning is needed here. The SSE handlers send
# `X-Accel-Buffering: no` on their own responses (which ingress-nginx honours,
# disabling buffering for just those responses — no Ingress-wide annotation
# required), and a 25s `:hb` comment line keeps each stream well under nginx's
# default 60s `proxy_read_timeout`, so idle streams aren't reaped.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-delivery
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: food-delivery.local
      http:
        paths:
          - pathType: ImplementationSpecific
            path: /api/(users(?:/.*)?)
            backend:
              service:
                name: user-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(auth(?:/.*)?)
            backend:
              service:
                name: user-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(restaurants(?:/.*)?)
            backend:
              service:
                name: restaurant-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(orders(?:/.*)?)
            backend:
              service:
                name: order-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(payments(?:/.*)?)
            backend:
              service:
                name: payment-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /api/(dispatch(?:/.*)?)
            backend:
              service:
                name: dispatch-service
                port:
                  number: 8080
          - pathType: ImplementationSpecific
            path: /(.*)
            backend:
              service:
                name: frontend
                port:
                  number: 80
