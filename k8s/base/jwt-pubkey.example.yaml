# Template only — the real ConfigMap lives at `jwt-pubkey.yaml` (gitignored)
# and is generated alongside the matching private key by
# `scripts/app-env-bootstrap.sh`. The public key is not a secret, but it must
# match the private key in the `jwt-keypair` Secret, so they're generated as
# a pair.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-pubkey
data:
  jwt.pub: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_ME_WITH_RS256_PUBLIC_KEY_PEM
    -----END PUBLIC KEY-----
