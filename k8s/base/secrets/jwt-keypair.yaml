# Stub Secret. Replace stringData with real RS256 keys before applying to a
# cluster you actually use. Generate with:
#   openssl genpkey -algorithm RSA -out jwt.key -pkeyopt rsa_keygen_bits:2048
#   openssl rsa -in jwt.key -pubout -out jwt.pub
# Then either inline them here or apply a real Secret from outside the
# kustomize tree (sealed-secrets / external-secrets / SOPS in production).
apiVersion: v1
kind: Secret
metadata:
  name: jwt-keypair
type: Opaque
stringData:
  jwt.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE-ME-WITH-REAL-RSA-PRIVATE-KEY
    -----END PRIVATE KEY-----
  jwt.pub: |
    -----BEGIN PUBLIC KEY-----
    REPLACE-ME-WITH-REAL-RSA-PUBLIC-KEY
    -----END PUBLIC KEY-----
