# Template only — do not apply this file directly. The real Secret lives at
# `jwt-privkey.yaml` (gitignored) and is generated per-cluster by
# `scripts/app-env-bootstrap.sh`. Only user-service mounts this key: it signs
# tokens and serves the matching public key at /.well-known/jwks.json, which
# every other service fetches. Keep this template in sync with the script.
#
# Manual generation:
#   openssl genpkey -algorithm RSA -out jwt.key -pkeyopt rsa_keygen_bits:2048
apiVersion: v1
kind: Secret
metadata:
  name: jwt-privkey
type: Opaque
stringData:
  jwt.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME_WITH_RS256_PRIVATE_KEY_PEM
    -----END PRIVATE KEY-----
