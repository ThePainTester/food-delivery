# Adds an imagePullSecret to every Deployment so kubelet can pull from the
# private registry. The Secret itself (`ghcr-credentials`) is NOT shipped in
# git — create it once per namespace with `kubectl create secret docker-registry`.
# See README "Private registry credentials".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: _placeholder  # ignored — kustomization.yaml uses `target:` to select all Deployments
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
