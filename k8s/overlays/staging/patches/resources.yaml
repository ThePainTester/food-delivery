# Medium resource bump for test — closer to prod sizing without the replica
# count, so integration runs are realistic but fit on a laptop.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  template:
    spec:
      containers:
        - name: user-service
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 750m, memory: 384Mi }
---
