apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: food-delivery-staging

resources:
  - namespace.yaml
  - ../../base

images:
  - name: food-delivery/user-service
    newTag: staging
  - name: food-delivery/restaurant-service
    newTag: staging
  - name: food-delivery/order-service
    newTag: staging
  - name: food-delivery/payment-service
    newTag: staging
  - name: food-delivery/frontend
    newTag: staging

patches:
  - path: patches/resources.yaml
  - path: patches/ingress-host.yaml
    target:
      kind: Ingress
      name: food-delivery
