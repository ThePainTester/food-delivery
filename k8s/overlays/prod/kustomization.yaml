apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: food-delivery-prod

resources:
  - namespace.yaml
  - ../../base

images:
  - name: food-delivery/user-service
    newName: ghcr.io/thepaintester/user-service
    newTag: v2.0.0
  - name: food-delivery/restaurant-service
    newName: ghcr.io/thepaintester/restaurant-service
    newTag: v2.0.0
  - name: food-delivery/order-service
    newName: ghcr.io/thepaintester/order-service
    newTag: v4.0.0
  - name: food-delivery/payment-service
    newName: ghcr.io/thepaintester/payment-service
    newTag: v3.0.0
  - name: food-delivery/dispatch-service
    newName: ghcr.io/thepaintester/dispatch-service
    newTag: v2.0.0
  - name: food-delivery/frontend
    newName: ghcr.io/thepaintester/frontend
    newTag: v1.4.0

# Replicas: 2 for stateless backends + frontend; stateful infra stays at 1
# (a single Postgres/Mongo/Rabbit per env is intentional — replication is
# out of scope for this phase).
replicas:
  - name: user-service
    count: 2
  - name: restaurant-service
    count: 2
  - name: order-service
    count: 2
  - name: payment-service
    count: 2
  - name: dispatch-service
    count: 2
  - name: frontend
    count: 2

patches:
  - path: patches/resources.yaml
  - path: patches/log-level.yaml
  - path: patches/ingress-host.yaml
    target:
      kind: Ingress
      name: food-delivery
  - path: patches/image-pull-secrets.yaml
    target:
      kind: Deployment
