apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  template:
    spec:
      containers:
        - name: user-service
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-service
spec:
  template:
    spec:
      containers:
        - name: restaurant-service
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 1000m, memory: 768Mi }
---
