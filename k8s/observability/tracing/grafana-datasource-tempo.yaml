# Tempo datasource for the Grafana that ships in kube-prometheus-stack.
# Picked up by Grafana's datasource sidecar (see kube-prometheus-stack.values.yaml,
# grafana.sidecar.datasources.label=grafana_datasource).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-tempo
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  tempo.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        uid: tempo
        url: http://tempo.observability.svc:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: ""
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
