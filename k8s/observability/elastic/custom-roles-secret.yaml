# Declarative ES role for Logstash, merged into the file-realm role
# store by ECK (Elasticsearch.spec.auth.roles). Least-privilege set
# needed to create-and-write a rolling daily index plus drive ILM.
apiVersion: v1
kind: Secret
metadata:
  name: es-custom-roles
  namespace: observability
type: Opaque
stringData:
  roles.yml: |
    food_delivery_logs_writer:
      cluster: ['monitor']
      indices:
        - names: ['food-delivery-logs-*']
          privileges:
            - auto_configure
            - create_index
            - index
            - manage
            - view_index_metadata
