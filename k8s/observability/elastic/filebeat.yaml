# Filebeat DaemonSet — runs on every node, tails container logs from
# /var/log/containers, enriches each line with K8s metadata (namespace,
# pod, labels), and ships to Logstash.
apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: filebeat
  namespace: observability
spec:
  type: filebeat
  version: 9.0.1
  config:
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          node: ${NODE_NAME}
          # Use `templates`, not `hints.default_config`: a hints block
          # activates hints autodiscover, which auto-loads modules for
          # ECK-annotated pods (Elasticsearch, Kibana) and clashes with
          # our own filestream input on the same container-id.
          templates:
            - config:
                # Filebeat 9.x: the `container` input type is gone; use
                # `filestream` with a populated `container` parser
                # (`- container: ~` serialises to null and is rejected).
                - type: filestream
                  id: kube-${data.kubernetes.container.id}
                  prospector.scanner.symlinks: true
                  parsers:
                    - container:
                        stream: all
                        format: auto
                  paths:
                    - /var/log/containers/*${data.kubernetes.container.id}.log
    processors:
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
      - add_cloud_metadata: {}
      - add_host_metadata: {}
    output.logstash:
      hosts: ["logstash-ls-beats.observability.svc:5044"]
  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: filebeat
        automountServiceAccountToken: true
        terminationGracePeriodSeconds: 30
        hostNetwork: true        # required for add_kubernetes_metadata when DNS isn't ready early
        dnsPolicy: ClusterFirstWithHostNet
        containers:
          - name: filebeat
            securityContext:
              runAsUser: 0
            env:
              - name: NODE_NAME
                valueFrom:
                  fieldRef: { fieldPath: spec.nodeName }
            volumeMounts:
              - name: varlogcontainers
                mountPath: /var/log/containers
              - name: varlogpods
                mountPath: /var/log/pods
              - name: varlibdockercontainers
                mountPath: /var/lib/docker/containers
            resources:
              requests: { cpu: 50m, memory: 128Mi }
              limits:   { memory: 256Mi }
        volumes:
          - name: varlogcontainers
            hostPath: { path: /var/log/containers }
          - name: varlogpods
            hostPath: { path: /var/log/pods }
          - name: varlibdockercontainers
            hostPath: { path: /var/lib/docker/containers }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: observability
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
