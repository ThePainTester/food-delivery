# Bootstraps the ILM policy + index template for food-delivery-logs-*.
# Idempotent (PUTs are upserts). The initContainer waits for ES /
# _cluster/health to go yellow/green before the bootstrap curls run.
apiVersion: batch/v1
kind: Job
metadata:
  name: es-ilm-bootstrap
  namespace: observability
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-es
          image: curlimages/curl:8.10.1
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef: { name: elasticsearch-es-elastic-user, key: elastic }
          command: ["sh", "-c"]
          args:
            - |
              set -e
              until curl -fsS -u "elastic:$ELASTIC_PASSWORD" "http://elasticsearch-es-http:9200/_cluster/health?wait_for_status=yellow&timeout=5s" >/dev/null; do
                echo "waiting for elasticsearch..."
                sleep 3
              done
      containers:
        - name: bootstrap
          image: curlimages/curl:8.10.1
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef: { name: elasticsearch-es-elastic-user, key: elastic }
          command: ["sh", "-c"]
          args:
            - |
              set -e
              ES=http://elasticsearch-es-http:9200
              AUTH="-u elastic:$ELASTIC_PASSWORD"

              echo ">> upsert ILM policy food-delivery-logs"
              curl -fsS $AUTH -X PUT "$ES/_ilm/policy/food-delivery-logs" \
                -H 'Content-Type: application/json' \
                -d '{
                  "policy": {
                    "phases": {
                      "hot": {
                        "actions": {
                          "rollover": { "max_age": "1d", "max_primary_shard_size": "5gb" }
                        }
                      },
                      "delete": {
                        "min_age": "7d",
                        "actions": { "delete": {} }
                      }
                    }
                  }
                }'
              echo

              echo ">> upsert index template food-delivery-logs"
              curl -fsS $AUTH -X PUT "$ES/_index_template/food-delivery-logs" \
                -H 'Content-Type: application/json' \
                -d '{
                  "index_patterns": ["food-delivery-logs-*"],
                  "template": {
                    "settings": {
                      "number_of_shards": 1,
                      "number_of_replicas": 0,
                      "index.lifecycle.name": "food-delivery-logs",
                      "index.lifecycle.rollover_alias": "food-delivery-logs"
                    },
                    "mappings": {
                      "properties": {
                        "@timestamp": { "type": "date" },
                        "trace_id":   { "type": "keyword" },
                        "span_id":    { "type": "keyword" },
                        "level":      { "type": "keyword" },
                        "service":    { "type": "keyword" },
                        "env":        { "type": "keyword" },
                        "msg":        { "type": "text" }
                      }
                    }
                  }
                }'
              echo
              echo ">> done"
