# Helm values for prometheus-community/kube-prometheus-stack.

fullnameOverride: kps

# Discover ServiceMonitors / PodMonitors / Rules cluster-wide, so the
# single observability-namespace Prometheus scrapes every food-delivery-*
# namespace and ingress-nginx.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}     # all namespaces
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}
    serviceMonitorSelector: {}              # all ServiceMonitors
    podMonitorSelector: {}
    ruleSelector: {}
    retention: 15d
    resources:
      requests: { cpu: 100m, memory: 512Mi }
      limits:   { memory: 2Gi }
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources: { requests: { storage: 20Gi } }

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits:   { memory: 256Mi }

grafana:
  adminPassword: admin            # local-only; rotate or sourceFromSecret in real envs
  # Shipped dashboards reference datasource.uid="prometheus" — don't
  # override or they'll render "No data".
  defaultDashboardsTimezone: Africa/Cairo
  service:
    type: ClusterIP
  # Auto-discover dashboard / datasource ConfigMaps anywhere in the cluster.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: ALL
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { memory: 512Mi }

kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true

# These don't exist on Minikube's control plane — suppress "down" alerts.
kubeControllerManager: { enabled: false }
kubeScheduler:         { enabled: false }
kubeEtcd:              { enabled: false }
kubeProxy:             { enabled: false }
