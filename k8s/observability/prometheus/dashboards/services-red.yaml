# Per-service RED (Rate / Errors / Duration) dashboard, filtered by
# the `env` and `service` labels.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-services-red
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Food Delivery
data:
  services-red.json: |
    {
      "title": "Food Delivery — Service RED",
      "uid": "fd-services-red",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["food-delivery", "red"],
      "templating": {
        "list": [
          {
            "name": "env",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(http_requests_total, env)",
            "refresh": 2,
            "includeAll": true,
            "multi": true
          },
          {
            "name": "service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(http_requests_total{env=~\"$env\"}, service)",
            "refresh": 2,
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request rate (req/s)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_requests_total{env=~\"$env\",service=~\"$service\"}[5m]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error rate (5xx req/s)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (service) (rate(http_requests_total{env=~\"$env\",service=~\"$service\",status=~\"5..\"}[5m]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "p95 latency (s)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (service, le) (rate(http_request_duration_seconds_bucket{env=~\"$env\",service=~\"$service\"}[5m])))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "p50 latency (s)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (service, le) (rate(http_request_duration_seconds_bucket{env=~\"$env\",service=~\"$service\"}[5m])))",
              "legendFormat": "{{service}}"
            }
          ]
        }
      ]
    }
