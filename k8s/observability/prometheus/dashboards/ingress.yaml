# NGINX Ingress Controller dashboard. No `env` variable: ingress series
# carry no `env` label (controller is outside food-delivery-*), and the
# `host` label already separates dev/staging/prod traffic.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-ingress-nginx
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Food Delivery
data:
  ingress.json: |
    {
      "title": "Food Delivery — Ingress (NGINX Controller)",
      "uid": "fd-ingress",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["food-delivery", "ingress"],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request rate by host",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (host) (rate(nginx_ingress_controller_requests[5m]))",
              "legendFormat": "{{host}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Status class breakdown (req/s)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (status) (label_replace(rate(nginx_ingress_controller_requests[5m]), \"status\", \"$1xx\", \"status\", \"(.).*\"))",
              "legendFormat": "{{status}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "p95 upstream latency by ingress (s)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (ingress, le) (rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{ingress}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "5xx rate by host",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (host) (rate(nginx_ingress_controller_requests{status=~\"5..\"}[5m]))",
              "legendFormat": "{{host}}"
            }
          ]
        }
      ]
    }
