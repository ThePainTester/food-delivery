# ServiceMonitors for the five backend services. Each app exposes
# /metrics on its API port (8080). `service` and `env` labels are
# stamped explicitly so dashboards don't depend on chart internals.

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-service
  namespace: observability
  labels:
    app.kubernetes.io/part-of: food-delivery
spec:
  namespaceSelector:
    matchNames: [food-delivery-dev, food-delivery-staging, food-delivery-prod]
  selector:
    matchLabels: { app: user-service }
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: env
          regex: food-delivery-(.+)
          replacement: $1

