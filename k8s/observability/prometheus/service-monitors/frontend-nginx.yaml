apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frontend-nginx
  namespace: observability
  labels:
    app.kubernetes.io/part-of: food-delivery
spec:
  namespaceSelector:
    matchNames: [food-delivery-dev, food-delivery-staging, food-delivery-prod]
  selector:
    matchLabels: { app: frontend }
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: env
          regex: food-delivery-(.+)
          replacement: $1
